version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: college_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: college_mgmt
      MYSQL_USER: college_user
      MYSQL_PASSWORD: college_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: college_backend
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: college_user
      DB_PASSWORD: college_pass
      DB_NAME: college_mgmt
      JWT_SECRET: super-secret-jwt-key-for-college-mgmt-system-2024
      JWT_EXPIRES_IN: 24h
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: college_frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
